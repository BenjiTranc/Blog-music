<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Blog Rap</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
        header { background: #ff004f; padding: 20px; text-align: center; }
        nav a { color: #fff; margin: 0 10px; text-decoration: none; }
        .rapper { margin: 20px; padding: 20px; background: #1e1e1e; border-radius: 10px; }
        iframe { margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>Mon Blog Rap</h1>
        <nav>
            <a href="#ninho">Ninho</a>
            <a href="#gradur">Gradur</a>
        </nav>
    </header>

    <div class="rapper" id="ninho">
        <h2>Ninho</h2>
        <p>Rappeur français que j'adore, quelques titres :</p>
        <ul>
            <li>Lettre à une femme</li>
            <li>Maman ne le sait pas</li>
        </ul>
        <iframe width="300" height="169" src="https://www.youtube.com/embed/https://www.youtube.com/watch?v=yGJLE1UXBjo&list=RDyGJLE1UXBjo&start_radio=1" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="rapper" id="Gradur">
        <h2>Gradur</h2>
        <p>Rappeur français avec un style unique :</p>
        <ul>
            <li>Sheguey 12</li>
            <li>Rosa</li>
        </ul>
        <iframe width="300" height="169" src="https://www.youtube.com/embed/https://www.youtube.com/watch?v=fOwCqw4Gvnw&list=RDfOwCqw4Gvnw&start_radio=1" frameborder="0" allowfullscreen></iframe>
    </div>

</body>
</html>
